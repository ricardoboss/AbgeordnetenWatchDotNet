name: NuGet Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: Publish NuGet Package

    environment: nuget.org

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'yarn'
          cache-dependency-path: AbgeordnetenWatchDotNet.ApiSpec/yarn.lock
      - name: Prepare yarn
        run: corepack prepare $(node -p "require('./AbgeordnetenWatchDotNet.ApiSpec/package.json').packageManager") --activate
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: AbgeordnetenWatchDotNet.ApiSpec/.yarn/cache
          key: yarn-${{ hashFiles('**/yarn.lock') }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
      - name: Build
        run: dotnet build -c Release
      - name: Publish AbgeordnetenWatchDotNet Package
        run: dotnet nuget push publish/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
