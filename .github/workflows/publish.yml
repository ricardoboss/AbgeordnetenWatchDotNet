name: NuGet Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: Publish NuGet Package

    environment: nuget.org

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'ricardoboss/AbgeordnetenWatchApiSpec'
          path: AbgeordnetenWatchApiSpec
      - uses: actions/checkout@v6
        with:
          path: AbgeordnetenWatchDotNet
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: AbgeordnetenWatchDotNet/global.json
      - name: Restore dependencies
        run: dotnet restore
        working-directory: AbgeordnetenWatchDotNet
      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: AbgeordnetenWatchDotNet
      - name: Publish AbgeordnetenWatchDotNet Package
        run: dotnet nuget push publish/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
