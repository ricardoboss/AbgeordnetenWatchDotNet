name: Regenerate Client

on:
  repository_dispatch:
    types: [ spec-updated ]
  workflow_dispatch:

jobs:
  regenerate:
    name: Regnerate

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
      - name: Restore dependencies
        run: dotnet restore
      - name: Regenerate client
        working-directory: AbgeordnetenWatchDotNet
        run: dotnet build -t:RegenerateClient
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: regenerate API client from updated spec"
          branch: chore/regenerate-client
          title: "chore: regenerate API client"
          body: "Automated regeneration triggered by spec update."
