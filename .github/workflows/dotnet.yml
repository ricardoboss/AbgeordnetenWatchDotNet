name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'ricardoboss/AbgeordnetenWatchApiSpec'
          path: AbgeordnetenWatchApiSpec
      - uses: actions/checkout@v6
        with:
          path: AbgeordnetenWatchDotNet
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: AbgeordnetenWatchDotNet/global.json
      - name: Restore dependencies
        run: dotnet restore
        working-directory: AbgeordnetenWatchDotNet
      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: AbgeordnetenWatchDotNet
