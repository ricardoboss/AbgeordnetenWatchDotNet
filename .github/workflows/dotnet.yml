name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Enable Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'yarn'
          cache-dependency-path: AbgeordnetenWatchDotNet.ApiSpec/yarn.lock
      - name: Prepare yarn
        run: corepack prepare $(node -p "require('./AbgeordnetenWatchDotNet.ApiSpec/package.json').packageManager") --activate
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: AbgeordnetenWatchDotNet.ApiSpec/.yarn/cache
          key: yarn-${{ hashFiles('**/yarn.lock') }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
